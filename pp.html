<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Push-Up Counter PRO</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      overflow: hidden;
      height: 100vh; width: 100vw;
      position: fixed;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    video {
      position: absolute; top:0; left:0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #pose-overlay {
      position: absolute; top:0; left:0;
      width: 100%; height: 100%;
      z-index: 5;
      pointer-events: none;
      transform: scaleX(-1);
    }
    #ui {
      position: absolute; top: 20px; left: 20px;
      z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
    }
    .counter-pill {
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius: 30px; padding: 6px 18px; border: 1px solid rgba(255,255,255,0.2);
    }
    .counter-number {
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 2.8rem; font-weight: 800;
      color: white; line-height: 1; text-shadow: 0 0 8px rgba(255,255,255,0.4);
    }
    .counter-label {
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.7rem;
      color: rgba(255,255,255,0.7); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .status-pill {
      background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); border-radius: 20px;
      padding: 4px 14px; border: 1px solid rgba(255,255,255,0.15);
    }
    .status-text {
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.85rem; color: rgba(255,255,255,0.8);
    }
    #switch-camera {
      position: absolute; bottom: 25px; right: 20px; z-index: 20; pointer-events: auto;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
      color: white; font-size: 1.2rem; padding: 0.6rem 1rem; cursor: pointer;
    }
    @media (max-width: 600px) {
      .counter-number { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <canvas id="pose-overlay"></canvas>
  <div id="ui">
    <div class="counter-pill">
      <div class="counter-number" id="counter">0</div>
      <div class="counter-label">push-ups</div>
    </div>
    <div class="status-pill">
      <div class="status-text" id="status">Siap</div>
    </div>
  </div>
  <button id="switch-camera">🔄</button>

  <script type="module">
    const video = document.getElementById('video');
    const counterEl = document.getElementById('counter');
    const statusEl = document.getElementById('status');
    const poseCanvas = document.getElementById('pose-overlay');
    const poseCtx = poseCanvas.getContext('2d');
    const switchBtn = document.getElementById('switch-camera');

    // State
    let count = 0;
    let isDown = false;
    let canCount = true;
    let baselineShoulderY = null; // referensi posisi bahu saat siap
    const DOWN_ANGLE = 85;
    const UP_ANGLE = 145;
    const SHOULDER_DROP_THRESHOLD = 0.04; // bahu harus turun minimal 4% tinggi frame
    let currentFacingMode = 'user';

    function setCounter(value) {
      counterEl.textContent = value;
      counterEl.style.transform = 'scale(1.2)';
      setTimeout(() => { counterEl.style.transform = 'scale(1)'; }, 120);
    }

    // ============ GAMBAR RIGID BODY SUPER DETAIL ============
    const POSE_CONNECTIONS = [
      [11,12],[12,24],[24,23],[23,11],[11,13],[13,15],[12,14],[14,16],
      [23,25],[25,27],[24,26],[26,28],[15,17],[16,18],[27,29],[28,30],
      [29,31],[30,32],[27,31],[28,32]
    ];
    // Face contours (subset dari 468 titik)
    const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
    const LEFT_EYE = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
    const RIGHT_EYE = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];
    const LIPS_OUTER = [61,146,91,181,84,17,314,405,321,375,291,308,324,318,402,317,14,87,178,88,95];
    const LIPS_INNER = [78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95];
    const LEFT_EYEBROW = [70,63,105,66,107,55,65,52,53,46];
    const RIGHT_EYEBROW = [300,293,334,296,336,285,295,282,283,276];

    function drawLandmarks(landmarks, w, h, color = 'rgba(255,255,255,0.8)', size = 3.5) {
      poseCtx.fillStyle = color;
      for (const lm of landmarks) {
        if (lm.visibility === undefined || lm.visibility > 0.4) {
          poseCtx.beginPath();
          poseCtx.arc(lm.x * w, lm.y * h, size, 0, 2*Math.PI);
          poseCtx.fill();
        }
      }
    }

    function drawConnections(landmarks, connections, w, h, color = 'rgba(255,255,255,0.85)', width = 2.2) {
      poseCtx.strokeStyle = color;
      poseCtx.lineWidth = width;
      poseCtx.lineCap = 'round';
      for (const [i, j] of connections) {
        const a = landmarks[i], b = landmarks[j];
        if (a && b && (a.visibility === undefined || a.visibility > 0.4) && (b.visibility === undefined || b.visibility > 0.4)) {
          poseCtx.beginPath();
          poseCtx.moveTo(a.x * w, a.y * h);
          poseCtx.lineTo(b.x * w, b.y * h);
          poseCtx.stroke();
        }
      }
    }

    function drawAllRigids(pose, face, leftHand, rightHand, avgAngle) {
      poseCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
      const w = poseCanvas.width, h = poseCanvas.height;

      // Pose
      if (pose && pose.length >= 33) {
        drawConnections(pose, POSE_CONNECTIONS, w, h);
        drawLandmarks(pose, w, h);
        
        // Highlight siku
        if (avgAngle !== undefined) {
          const color = avgAngle < DOWN_ANGLE ? 'rgba(255,80,80,0.9)' : 
                        avgAngle > UP_ANGLE ? 'rgba(80,255,120,0.8)' : 'rgba(255,255,255,0.6)';
          [pose[13], pose[14]].forEach(e => {
            if (e.visibility > 0.5) {
              poseCtx.fillStyle = color;
              poseCtx.beginPath();
              poseCtx.arc(e.x * w, e.y * h, 6, 0, 2*Math.PI);
              poseCtx.fill();
            }
          });
        }
      }

      // Face (subset)
      if (face && face.length >= 468) {
        drawConnections(face, FACE_OVAL, w, h, 'rgba(255,255,255,0.65)', 1.8);
        drawConnections(face, LEFT_EYE, w, h, 'rgba(255,255,255,0.7)', 1.5);
        drawConnections(face, RIGHT_EYE, w, h, 'rgba(255,255,255,0.7)', 1.5);
        drawConnections(face, LIPS_OUTER, w, h, 'rgba(255,255,255,0.7)', 1.5);
        drawConnections(face, LEFT_EYEBROW, w, h, 'rgba(255,255,255,0.7)', 1.5);
        drawConnections(face, RIGHT_EYEBROW, w, h, 'rgba(255,255,255,0.7)', 1.5);
        drawLandmarks(face.slice(0, 468), w, h, 'rgba(255,255,255,0.45)', 1.2);
      }

      // Hands
      const HAND_CONNECTIONS = [
        [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
        [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
        [0,17],[17,18],[18,19],[19,20]
      ];
      if (leftHand && leftHand.length === 21) {
        drawConnections(leftHand, HAND_CONNECTIONS, w, h, 'rgba(255,255,255,0.9)', 2.0);
        drawLandmarks(leftHand, w, h, 'rgba(255,255,255,0.9)', 3);
      }
      if (rightHand && rightHand.length === 21) {
        drawConnections(rightHand, HAND_CONNECTIONS, w, h, 'rgba(255,255,255,0.9)', 2.0);
        drawLandmarks(rightHand, w, h, 'rgba(255,255,255,0.9)', 3);
      }
    }

    // ============ ANALISIS PUSH-UP (ANTI CURANG) ============
    function calculateAngle(a, b, c) {
      const ba = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
      const bc = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
      const dot = ba.x*bc.x + ba.y*bc.y + ba.z*bc.z;
      const magBA = Math.sqrt(ba.x**2 + ba.y**2 + ba.z**2);
      const magBC = Math.sqrt(bc.x**2 + bc.y**2 + bc.z**2);
      if (magBA < 0.001 || magBC < 0.001) return 180;
      const cos = Math.max(-1, Math.min(1, dot / (magBA * magBC)));
      return Math.acos(cos) * (180 / Math.PI);
    }

    function processPose(poseLandmarks) {
      if (!poseLandmarks || poseLandmarks.length < 33) return;

      const leftShoulder = poseLandmarks[11], rightShoulder = poseLandmarks[12];
      const leftElbow = poseLandmarks[13], rightElbow = poseLandmarks[14];
      const leftWrist = poseLandmarks[15], rightWrist = poseLandmarks[16];
      const leftHip = poseLandmarks[23], rightHip = poseLandmarks[24];

      const minVis = 0.5;
      if (leftShoulder.visibility < minVis || rightShoulder.visibility < minVis ||
          leftElbow.visibility < minVis || rightElbow.visibility < minVis ||
          leftWrist.visibility < minVis || rightWrist.visibility < minVis) {
        statusEl.textContent = 'Pose tidak jelas';
        return null;
      }

      const leftAngle = calculateAngle(leftShoulder, leftElbow, leftWrist);
      const rightAngle = calculateAngle(rightShoulder, rightElbow, rightWrist);
      const avgAngle = (leftAngle + rightAngle) / 2;
      const currentShoulderY = (leftShoulder.y + rightShoulder.y) / 2;

      // State machine
      if (!isDown && avgAngle < DOWN_ANGLE && canCount) {
        // Cek apakah bahu turun cukup
        if (baselineShoulderY !== null && (currentShoulderY - baselineShoulderY) > SHOULDER_DROP_THRESHOLD) {
          isDown = true;
          canCount = false;
          statusEl.textContent = 'Turun';
        } else {
          statusEl.textContent = 'Kurangi tekuk siku saja';
        }
      } else if (isDown && avgAngle > UP_ANGLE) {
        isDown = false;
        canCount = true;
        count++;
        setCounter(count);
        statusEl.textContent = 'Naik';
        baselineShoulderY = currentShoulderY; // reset baseline setelah naik
      } else if (!isDown && avgAngle >= UP_ANGLE) {
        statusEl.textContent = 'Siap';
        canCount = true;
        baselineShoulderY = currentShoulderY; // perbarui baseline saat siap
      }

      return avgAngle;
    }

    // ============ LOAD MEDIAPIPE HOLISTIC ============
    async function loadMediaPipeHolistic() {
      const scripts = [
        'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js',
        'https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6/control_utils.js',
        'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js',
        'https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5/holistic.js'
      ];
      for (const src of scripts) {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }
      await new Promise(r => setTimeout(r, 300));
    }

    // ============ KAMERA ============
    let stream = null;
    async function startCamera(facingMode) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await video.play();
    }
    switchBtn.addEventListener('click', async () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      await startCamera(currentFacingMode);
    });

    // ============ INIT ============
    async function init() {
      try {
        await loadMediaPipeHolistic();
        await startCamera('user');

        function resizeOverlay() {
          poseCanvas.width = window.innerWidth;
          poseCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeOverlay);
        resizeOverlay();

        const holistic = new window.Holistic({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5/${file}`
        });
        holistic.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          refineFaceLandmarks: false,
          minDetectionConfidence: 0.6,
          minTrackingConfidence: 0.5
        });

        holistic.onResults((results) => {
          const pose = results.poseLandmarks;
          const face = results.faceLandmarks;
          const leftHand = results.leftHandLandmarks;
          const rightHand = results.rightHandLandmarks;

          if (pose) {
            const avgAngle = processPose(pose);
            drawAllRigids(pose, face, leftHand, rightHand, avgAngle);
          } else {
            poseCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
            statusEl.textContent = 'Mencari pose...';
          }
        });

        async function processFrame() {
          if (video.readyState >= 2) {
            await holistic.send({ image: video });
          }
          requestAnimationFrame(processFrame);
        }
        processFrame();

      } catch (err) {
        alert('Gagal kamera: ' + err.message);
      }
    }

    init();
  </script>
</body>
  </html>
