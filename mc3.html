<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mini Minecraft</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;
  user-select:none;-webkit-user-select:none;position:fixed;height:100%;width:100%;
  touch-action:manipulation;
}
canvas{display:block;}

/* Crosshair */
#crosshair{
  position:absolute;top:50%;left:50%;width:18px;height:18px;
  transform:translate(-50%,-50%);pointer-events:none;z-index:100;
}
#crosshair div{position:absolute;background:rgba(255,255,255,0.9);}
#crosshair .h{width:100%;height:1.5px;top:8px;left:0;}
#crosshair .v{height:100%;width:1.5px;left:8px;top:0;}

/* Joystick gerak */
.joystick-move{
  position:absolute;bottom:100px;left:40px;
  width:100px;height:100px;background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,255,255,0.25);border-radius:50%;
  pointer-events:auto;touch-action:none;z-index:50;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.joystick-move .thumb{
  position:absolute;width:44px;height:44px;
  background:rgba(255,255,255,0.55);border-radius:50%;
  left:28px;top:28px;
}

/* Tombol lompat */
#jump-btn{
  position:absolute;bottom:210px;right:30px;
  width:70px;height:70px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.35);
  color:white;font-size:26px;display:flex;align-items:center;justify-content:center;
  pointer-events:auto;z-index:50;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#jump-btn:active{background:rgba(255,255,255,0.3);}

/* Hotbar */
#hotbar{
  position:absolute;bottom:25px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:50;
  background:rgba(0,0,0,0.55);padding:6px 10px;border-radius:12px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
}
.slot{
  width:46px;height:46px;background:rgba(0,0,0,0.4);
  border:2px solid rgba(255,255,255,0.2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  pointer-events:auto;cursor:pointer;
}
.slot.selected{border-color:white;box-shadow:0 0 12px rgba(255,255,255,0.5);}
.slot .icon{font-size:20px;}

/* Tombol aksi (hancurkan & tempatkan) */
#action-btns{
  position:absolute;bottom:110px;right:30px;
  display:flex;flex-direction:column;gap:10px;z-index:50;
}
.action-btn{
  width:56px;height:56px;border-radius:50%;
  background:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.4);
  color:white;font-size:24px;display:flex;align-items:center;justify-content:center;
  pointer-events:auto;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.action-btn:active{background:rgba(255,255,255,0.25);}
</style>
</head>
<body>

<div id="crosshair"><div class="h"></div><div class="v"></div></div>

<div class="joystick-move" id="joystickMove">
  <div class="thumb" id="moveThumb"></div>
</div>

<div id="jump-btn">▲</div>

<div id="hotbar">
  <div class="slot selected" data-block="dirt"><span class="icon">🟫</span></div>
  <div class="slot" data-block="grass"><span class="icon">🟩</span></div>
  <div class="slot" data-block="stone"><span class="icon">⬜</span></div>
  <div class="slot" data-block="wood"><span class="icon">🟨</span></div>
  <div class="slot" data-block="leaf"><span class="icon">🌿</span></div>
  <div class="slot" data-block="sand"><span class="icon">🏖️</span></div>
  <div class="slot" data-block="brick"><span class="icon">🧱</span></div>
</div>

<div id="action-btns">
  <div class="action-btn" id="breakBtn">⛏️</div>
  <div class="action-btn" id="placeBtn">⬜</div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// Audio (natural noise-based, bukan robot)
const AudioCtx = window.AudioContext||window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function noiseBuffer(duration,sampleRate=8000){
  const len=duration*sampleRate;
  const buf=audioCtx.createBuffer(1,len,sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<len;i++)data[i]=Math.random()*2-1;
  return buf;
}
function playNatural(action){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  if(action==='break'){
    // Suara patah: noise + lowpass + click
    const noise=audioCtx.createBufferSource();
    noise.buffer=noiseBuffer(0.15);
    const filter=audioCtx.createBiquadFilter();
    filter.type='lowpass';filter.frequency.value=600;
    const gain=audioCtx.createGain();
    gain.gain.setValueAtTime(0.2,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    noise.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);
    noise.start(t);noise.stop(t+0.15);
    // Click
    const osc=audioCtx.createOscillator();
    osc.type='sine';osc.frequency.value=800;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    osc.connect(g);g.connect(audioCtx.destination);
    osc.start(t);osc.stop(t+0.05);
  }else if(action==='place'){
    // Suara taruh: thud rendah
    const osc=audioCtx.createOscillator();
    osc.type='sine';osc.frequency.value=150;
    const gain=audioCtx.createGain();
    gain.gain.setValueAtTime(0.25,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start(t);osc.stop(t+0.1);
  }else if(action==='jump'){
    const osc=audioCtx.createOscillator();
    osc.type='sine';osc.frequency.value=250;
    const gain=audioCtx.createGain();
    gain.gain.setValueAtTime(0.1,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start(t);osc.stop(t+0.08);
  }
}

// World (datar)
const world={};
function getBlock(x,y,z){return world[`${x},${y},${z}`]||null;}
function setBlock(x,y,z,type){
  if(type)world[`${x},${y},${z}`]=type;
  else delete world[`${x},${y},${z}`];
}
// Generate flat terrain
for(let x=-8;x<=8;x++){
  for(let z=-8;z<=8;z++){
    for(let y=0;y<5;y++){
      if(y===4)setBlock(x,y,z,'grass');
      else if(y>=1)setBlock(x,y,z,'dirt');
      else setBlock(x,y,z,'stone');
    }
  }
}

// Three.js
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.Fog(0x87CEEB,25,60);
const camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,6,8);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x8899bb));
const sun=new THREE.DirectionalLight(0xffeedd,1.0);
sun.position.set(10,20,8);
sun.castShadow=true;
sun.shadow.mapSize.width=512;sun.shadow.mapSize.height=512;
sun.shadow.camera.near=0.5;sun.shadow.camera.far=60;
sun.shadow.camera.left=-15;sun.shadow.camera.right=15;
sun.shadow.camera.top=15;sun.shadow.camera.bottom=-15;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87CEEB,0x4a5a3d,0.5));

// Textures procedural
function tex(col){
  const c=document.createElement('canvas');c.width=16;c.height=16;
  const ctx=c.getContext('2d');ctx.fillStyle=col;ctx.fillRect(0,0,16,16);
  for(let i=0;i<35;i++){ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.15})`;ctx.fillRect(Math.floor(Math.random()*16),Math.floor(Math.random()*16),1,1);}
  const t=new THREE.CanvasTexture(c);t.magFilter=THREE.NearestFilter;t.minFilter=THREE.NearestFilter;
  return t;
}
const mat={
  grass:new THREE.MeshStandardMaterial({map:tex('#7c9c4c'),roughness:0.85}),
  dirt:new THREE.MeshStandardMaterial({map:tex('#9b7653'),roughness:0.9}),
  stone:new THREE.MeshStandardMaterial({map:tex('#888888'),roughness:0.7,metalness:0.1}),
  wood:new THREE.MeshStandardMaterial({map:tex('#bc9862'),roughness:0.9}),
  leaf:new THREE.MeshStandardMaterial({map:tex('#3d6b2e'),roughness:0.8,transparent:true,opacity:0.85}),
  sand:new THREE.MeshStandardMaterial({map:tex('#f4e4b0'),roughness:0.9}),
  brick:new THREE.MeshStandardMaterial({map:tex('#b53c2c'),roughness:0.8}),
};

const blockGeo=new THREE.BoxGeometry(1,1,1);
const worldGrp=new THREE.Group();scene.add(worldGrp);
function rebuild(){
  while(worldGrp.children.length)worldGrp.remove(worldGrp.children[0]);
  for(const[key,type]of Object.entries(world)){
    const[x,y,z]=key.split(',').map(Number);
    const m=new THREE.Mesh(blockGeo,mat[type]||mat.stone);
    m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;
    worldGrp.add(m);
  }
}
rebuild();

// Player
const player={
  pos:new THREE.Vector3(0,6,0),
  vel:new THREE.Vector3(),
  onGround:false,
  yaw:0,pitch:0,
  height:1.6,speed:0.07,jump:0.18,gravity:-0.008,
  selected:'dirt'
};
function updateCam(){
  const d=new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch),Math.sin(player.pitch),-Math.cos(player.yaw)*Math.cos(player.pitch));
  camera.position.copy(player.pos.clone().add(new THREE.Vector3(0,player.height,0)));
  camera.lookAt(camera.position.clone().add(d));
}
function coll(pos){
  const f=pos.clone().add(new THREE.Vector3(0,0.05,0));
  const h=pos.clone().add(new THREE.Vector3(0,player.height-0.1,0));
  for(let x=Math.floor(f.x-0.25);x<=Math.floor(f.x+0.25);x++)
    for(let y=Math.floor(f.y);y<=Math.floor(h.y);y++)
      for(let z=Math.floor(f.z-0.25);z<=Math.floor(f.z+0.25);z++)
        if(getBlock(x,y,z))return true;
  return false;
}
function phys(){
  player.vel.y+=player.gravity;
  const n=player.pos.clone().add(player.vel);
  if(!coll(new THREE.Vector3(n.x,player.pos.y,player.pos.z)))player.pos.x=n.x;
  if(!coll(new THREE.Vector3(player.pos.x,player.pos.y,n.z)))player.pos.z=n.z;
  if(!coll(new THREE.Vector3(player.pos.x,n.y,player.pos.z))){
    player.pos.y=n.y;player.onGround=false;
  }else{player.vel.y=0;player.onGround=true;}
  updateCam();
}

// Input keyboard
const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;e.preventDefault();});
document.addEventListener('mousemove',e=>{
  if(document.pointerLockElement===renderer.domElement){
    player.yaw-=e.movementX*0.002;player.pitch-=e.movementY*0.002;
    player.pitch=Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,player.pitch));
  }
});
renderer.domElement.addEventListener('click',()=>renderer.domElement.requestPointerLock());

// Joystick move (multi-touch aware)
const jBase=document.getElementById('joystickMove'),jThumb=document.getElementById('moveThumb');
let moveVec={x:0,z:0};
let moveTouchId=null;
jBase.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  for(const t of e.changedTouches){
    if(!moveTouchId){moveTouchId=t.identifier;updateMove(t);}
  }
});
jBase.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){if(t.identifier===moveTouchId)updateMove(t);}
});
jBase.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===moveTouchId){
      moveTouchId=null;moveVec={x:0,z:0};jThumb.style.left='28px';jThumb.style.top='28px';
    }
  }
});
function updateMove(touch){
  const r=jBase.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  let dx=touch.clientX-cx,dy=touch.clientY-cy;
  const max=38,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>max){dx=dx/dist*max;dy=dy/dist*max;}
  jThumb.style.left=(28+dx)+'px';jThumb.style.top=(28+dy)+'px';
  moveVec.x=dx/max;moveVec.z=-dy/max;
}

// Kamera geser (multi-touch, bisa bareng joystick)
let camTouchId=null,lastCX=0,lastCY=0;
renderer.domElement.addEventListener('touchstart',e=>{
  initAudio();
  for(const t of e.changedTouches){
    if(t.target.closest('#joystickMove')||t.target.closest('#jump-btn')||
       t.target.closest('#action-btns')||t.target.closest('#hotbar'))continue;
    if(!camTouchId){camTouchId=t.identifier;lastCX=t.clientX;lastCY=t.clientY;}
  }
},{passive:false});
renderer.domElement.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===camTouchId){
      const dx=t.clientX-lastCX,dy=t.clientY-lastCY;
      player.yaw-=dx*0.005;player.pitch-=dy*0.005;
      player.pitch=Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,player.pitch));
      lastCX=t.clientX;lastCY=t.clientY;
    }
  }
},{passive:false});
renderer.domElement.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){if(t.identifier===camTouchId){camTouchId=null;}}
});

// Lompat
document.getElementById('jump-btn').addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  if(player.onGround){player.vel.y=player.jump;player.onGround=false;playNatural('jump');}
});

// Hotbar
document.querySelectorAll('.slot').forEach(s=>{
  s.addEventListener('touchstart',e=>{
    e.preventDefault();
    document.querySelector('.slot.selected').classList.remove('selected');
    s.classList.add('selected');player.selected=s.dataset.block;
  });
});

// Target & aksi
function targetBlock(){
  const d=new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch),Math.sin(player.pitch),-Math.cos(player.yaw)*Math.cos(player.pitch));
  const o=camera.position.clone();
  for(let i=0;i<10;i++){
    const p=o.clone().add(d.clone().multiplyScalar(i*0.5));
    const bx=Math.round(p.x),by=Math.round(p.y),bz=Math.round(p.z);
    if(getBlock(bx,by,bz))return new THREE.Vector3(bx,by,bz);
  }
  return null;
}
function breakBlock(){
  const t=targetBlock();if(!t)return;
  const{x,y,z}=t;
  if(getBlock(x,y,z)){setBlock(x,y,z,null);rebuild();playNatural('break');}
}
function placeBlock(){
  const d=new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch),Math.sin(player.pitch),-Math.cos(player.yaw)*Math.cos(player.pitch));
  const o=camera.position.clone();
  for(let i=0;i<10;i++){
    const p=o.clone().add(d.clone().multiplyScalar(i*0.5));
    const bx=Math.round(p.x),by=Math.round(p.y),bz=Math.round(p.z);
    if(getBlock(bx,by,bz)){
      const prev=p.clone().add(d.clone().multiplyScalar(-0.5));
      const px=Math.round(prev.x),py=Math.round(prev.y),pz=Math.round(prev.z);
      if(!getBlock(px,py,pz)){
        const pf=Math.round(player.pos.x),pfy=Math.round(player.pos.y),pfz=Math.round(player.pos.z);
        if(!(px===pf&&py===pfy&&pz===pfz)&&!(px===pf&&py===pfy+1&&pz===pfz)){
          setBlock(px,py,pz,player.selected);rebuild();playNatural('place');
        }
      }
      break;
    }
  }
}
document.getElementById('breakBtn').addEventListener('touchstart',e=>{e.preventDefault();breakBlock();});
document.getElementById('placeBtn').addEventListener('touchstart',e=>{e.preventDefault();placeBlock();});
window.addEventListener('mousedown',e=>{if(e.button===0)breakBlock();if(e.button===2)placeBlock();});
window.addEventListener('contextmenu',e=>e.preventDefault());

// Game loop
function animate(){
  requestAnimationFrame(animate);
  const mv=new THREE.Vector3();
  if(keys['w']||keys['arrowup'])mv.z+=1;
  if(keys['s']||keys['arrowdown'])mv.z-=1;
  if(keys['a']||keys['arrowleft'])mv.x-=1;
  if(keys['d']||keys['arrowright'])mv.x+=1;
  mv.x+=moveVec.x;mv.z+=moveVec.z;
  if(mv.length()>0){
    mv.normalize();
    const fwd=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
    const rgt=new THREE.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw));
    const vel=new THREE.Vector3().add(fwd.clone().multiplyScalar(mv.z)).add(rgt.clone().multiplyScalar(mv.x)).normalize().multiplyScalar(player.speed);
    player.pos.x+=vel.x;player.pos.z+=vel.z;
    if(coll(player.pos)){player.pos.x-=vel.x;player.pos.z-=vel.z;}
  }
  if((keys[' ']||keys['space'])&&player.onGround){player.vel.y=player.jump;player.onGround=false;playNatural('jump');}
  phys();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
  </html>
